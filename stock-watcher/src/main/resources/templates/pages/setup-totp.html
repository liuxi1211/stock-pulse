<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置两步验证 - StockPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <link th:href="@{/css/components.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .login-bg::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.12) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .login-card-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-card-icon {
            width: 56px;
            height: 56px;
            background: var(--gradient-primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .login-card-title {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .login-card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .setup-section {
            margin-bottom: 24px;
        }

        .setup-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .setup-step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gradient-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            font-family: var(--font-display);
        }

        .setup-step-content {
            flex: 1;
            padding-top: 3px;
        }

        .setup-step-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .qrcode-wrapper {
            text-align: center;
            margin: 16px 0;
        }

        .qrcode-box {
            display: inline-block;
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        #qrcode {
            display: block;
        }

        #qrcode img {
            border-radius: 8px;
        }

        .secret-key-wrapper {
            text-align: center;
            margin-top: 12px;
        }

        .secret-key-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .secret-key {
            display: inline-block;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
            word-break: break-all;
            user-select: all;
        }

        .login-form .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .login-form .form-control {
            height: 44px;
            background: var(--bg-input);
            border-color: var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .login-form .form-control:focus {
            background: var(--bg-input-hover);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .login-form .form-control::placeholder {
            color: var(--text-muted);
        }

        .code-input {
            text-align: center;
            letter-spacing: 8px;
            font-size: 1.5rem !important;
            font-family: var(--font-mono);
        }

        .login-form .btn-primary {
            height: 44px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        .login-footer p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        .alert {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 13px;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--rise-light);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--fall-light);
        }

        @media (max-width: 575.98px) {
            .login-card-wrapper {
                padding: 24px 20px;
            }

            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-bg"></div>

        <div class="login-card-wrapper">
            <div class="login-card">
                <div class="login-card-header">
                    <div class="login-card-icon">
                        <i class="bi bi-shield-check"></i>
                    </div>
                    <h2 class="login-card-title">设置两步验证</h2>
                    <p class="login-card-subtitle">首次登录，请设置 Google Authenticator</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

                <div class="setup-section">
                    <div class="setup-step">
                        <div class="setup-step-number">1</div>
                        <div class="setup-step-content">
                            <div class="setup-step-title">扫描二维码</div>
                            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 0;">
                                使用 Authenticator 应用扫描下方二维码
                            </p>
                        </div>
                    </div>
                    <div class="qrcode-wrapper">
                        <div class="qrcode-box">
                            <div id="qrcode"></div>
                        </div>
                        <div class="secret-key-wrapper">
                            <div class="secret-key-label">或手动输入密钥：</div>
                            <code class="secret-key" th:text="${secret}"></code>
                        </div>
                    </div>
                </div>

                <form method="post" th:action="@{/login/setup-totp}" class="login-form">
                    <div class="setup-step" style="margin-bottom: 16px;">
                        <div class="setup-step-number">2</div>
                        <div class="setup-step-content">
                            <div class="setup-step-title">输入验证码</div>
                            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 0;">
                                输入应用中显示的 6 位验证码
                            </p>
                        </div>
                    </div>
                    <div class="mb-4">
                        <input type="text" name="code" class="form-control form-control-lg code-input"
                               placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                               required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-2"></i>确认绑定
                    </button>
                </form>

                <div class="login-footer">
                    <p>© 2024 StockPulse. 保留所有权利。</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script th:inline="javascript">
        const otpAuthUrl = /*[[${otpAuthUrl}]]*/ '';
        if (otpAuthUrl) {
            new QRCode(document.getElementById("qrcode"), {
                text: otpAuthUrl,
                width: 200,
                height: 200,
                correctLevel: QRCode.CorrectLevel.M
            });
        }
    </script>
</body>
</html>
