<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${pageTitle})}">
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
    <nav th:replace="~{fragments/common :: sidebar}"></nav>

    <!-- Sidebar Overlay -->
    <div th:replace="~{fragments/common :: sidebarOverlay}"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <header th:replace="~{fragments/common :: topNavbar}"></header>

        <!-- Page Content -->
        <main class="content-area">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1 class="page-title">仪表盘</h1>
                    <p class="text-muted mb-0" style="font-size: 13px; margin-top: 4px;">实时监控市场动态，掌握投资先机</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-secondary btn-sm" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                    <button class="btn btn-primary btn-sm" id="exportBtn">
                        <i class="bi bi-download"></i> 导出
                    </button>
                </div>
            </div>

            <!-- Row 1: Market Index Cards -->
            <!-- 空数据兜底: index_daily 无数据时展示 4 个占位卡片 -->
            <div class="row g-4 mb-4" th:if="${#lists.isEmpty(indices)}">
                <div class="col-6 col-lg-3 animate-in delay-1">
                    <div class="stat-card card-glow h-100">
                        <div class="stat-label">上证指数</div>
                        <div class="stat-value text-muted">--</div>
                        <div class="stat-change"><span class="text-muted" style="font-size: 12px;">暂无数据</span></div>
                    </div>
                </div>
                <div class="col-6 col-lg-3 animate-in delay-1">
                    <div class="stat-card card-glow h-100">
                        <div class="stat-label">深证成指</div>
                        <div class="stat-value text-muted">--</div>
                        <div class="stat-change"><span class="text-muted" style="font-size: 12px;">暂无数据</span></div>
                    </div>
                </div>
                <div class="col-6 col-lg-3 animate-in delay-1">
                    <div class="stat-card card-glow h-100">
                        <div class="stat-label">创业板指</div>
                        <div class="stat-value text-muted">--</div>
                        <div class="stat-change"><span class="text-muted" style="font-size: 12px;">暂无数据</span></div>
                    </div>
                </div>
                <div class="col-6 col-lg-3 animate-in delay-1">
                    <div class="stat-card card-glow h-100">
                        <div class="stat-label">科创50</div>
                        <div class="stat-value text-muted">--</div>
                        <div class="stat-change"><span class="text-muted" style="font-size: 12px;">暂无数据</span></div>
                    </div>
                </div>
            </div>
            <!-- 有数据: 服务端渲染真实指数行情 -->
            <div class="row g-4 mb-4" th:unless="${#lists.isEmpty(indices)}">
                <div class="col-6 col-lg-3 animate-in delay-1" th:each="idx, iterStat : ${indices}">
                    <div class="stat-card card-glow h-100">
                        <div class="stat-label" th:text="${idx.name}">上证指数</div>
                        <div class="stat-value"
                             th:class="${idx.changePercent != null and idx.changePercent.doubleValue() >= 0} ? 'stock-up' : 'stock-down'"
                             th:text="${idx.currentPoint != null ? #numbers.formatDecimal(idx.currentPoint, 1, 2) : '--'}">3368.07</div>
                        <div class="stat-change">
                            <span th:class="${idx.changePercent != null and idx.changePercent.doubleValue() >= 0} ? 'stock-up' : 'stock-down'">
                                <i class="bi bi-triangle-fill" style="font-size: 9px;"
                                   th:style="${idx.changePercent != null and idx.changePercent.doubleValue() >= 0} ? 'font-size: 9px;' : 'font-size: 9px; transform: rotate(180deg);'"></i>
                                <span th:if="${idx.changeAmount != null}"
                                      th:text="${(idx.changePercent.doubleValue() >= 0 ? '+' : '') + #numbers.formatDecimal(idx.changeAmount, 1, 2)}">+12.34</span>
                                <span th:text="${idx.changePercent != null ? ((idx.changePercent.doubleValue() >= 0 ? '+' : '') + #numbers.formatDecimal(idx.changePercent, 1, 2) + '%') : '--'}">+0.37%</span>
                            </span>
                            <span class="text-muted" style="font-size: 11px; margin-left: 8px;" th:if="${idx.turnover != null}">
                                <span th:text="'成交额 ' + ${idx.turnover}">4560亿</span>
                            </span>
                        </div>
                        <div class="text-muted" style="font-size: 11px; margin-top: 2px;" th:if="${idx.tradeDate != null}">
                            <span th:text="'截至 ' + ${idx.tradeDate}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 1.5: Market Temperature (涨跌家数) -->
            <div class="row g-4 mb-4">
                <div class="col-12 animate-in delay-1">
                    <div class="card card-glow">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon">
                                    <i class="bi bi-thermometer-half"></i>
                                </span>
                                市场温度
                            </h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-3 text-center" id="temperatureContainer">
                                <div class="col-6 col-md">
                                    <div class="text-muted small mb-1">涨家数</div>
                                    <div class="fs-4 fw-bold stock-up" id="tempUpCount">--</div>
                                </div>
                                <div class="col-6 col-md">
                                    <div class="text-muted small mb-1">跌家数</div>
                                    <div class="fs-4 fw-bold stock-down" id="tempDownCount">--</div>
                                </div>
                                <div class="col-6 col-md">
                                    <div class="text-muted small mb-1">平家数</div>
                                    <div class="fs-4 fw-bold text-muted" id="tempFlatCount">--</div>
                                </div>
                                <div class="col-6 col-md">
                                    <div class="text-muted small mb-1">涨停数</div>
                                    <div class="fs-4 fw-bold stock-up" id="tempLimitUp">--</div>
                                </div>
                                <div class="col-6 col-md">
                                    <div class="text-muted small mb-1">跌停数</div>
                                    <div class="fs-4 fw-bold stock-down" id="tempLimitDown">--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Row 2: K-Line + Watchlist -->
            <div class="row g-4 mb-4">
                <div class="col-lg-8 animate-in delay-2">
                    <div class="card card-glow h-100">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon">
                                    <i class="bi bi-graph-up"></i>
                                </span>
                                <span id="klineTitle">日K线图</span>
                            </h6>
                            <div class="card-actions">
                                <div class="btn-group btn-group-sm" id="klinePeriodBtns">
                                    <button type="button" class="btn btn-secondary active" onclick="changePeriod('daily', this)">日K</button>
                                    <button type="button" class="btn btn-secondary" onclick="changePeriod('weekly', this)">周K</button>
                                    <button type="button" class="btn btn-secondary" onclick="changePeriod('monthly', this)">月K</button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                                <div class="input-group" style="max-width: 220px;">
                                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control" id="klineSearchInput"
                                           placeholder="输入股票代码，如 600519">
                                </div>
                                <button class="btn btn-primary btn-sm" onclick="searchKline()">
                                    <i class="bi bi-search"></i> 搜索
                                </button>
                                <div class="btn-group btn-group-sm flex-wrap gap-1" id="klineStockBtns">
                                </div>
                                <!-- 主图指标切换: MA / BOLL -->
                                <div class="btn-group btn-group-sm ms-auto" id="mainIndicatorBtns">
                                    <button type="button" class="btn btn-secondary active" onclick="switchMainIndicator('ma', this)">MA</button>
                                    <button type="button" class="btn btn-secondary" onclick="switchMainIndicator('boll', this)">BOLL</button>
                                </div>
                            </div>
                            <div id="klineChart" class="chart-container"></div>
                            <!-- 副图指标切换: MACD / KDJ / RSI / 无 -->
                            <div class="d-flex align-items-center gap-2 mt-2">
                                <div class="btn-group btn-group-sm" id="subIndicatorBtns">
                                    <button type="button" class="btn btn-secondary" onclick="switchSubIndicator('none', this)">无</button>
                                    <button type="button" class="btn btn-secondary active" onclick="switchSubIndicator('macd', this)">MACD</button>
                                    <button type="button" class="btn btn-secondary" onclick="switchSubIndicator('kdj', this)">KDJ</button>
                                    <button type="button" class="btn btn-secondary" onclick="switchSubIndicator('rsi', this)">RSI</button>
                                </div>
                            </div>
                            <div id="subIndicatorChart" style="width: 100%; height: 160px; position: relative; display: none;"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4 animate-in delay-3">
                    <div class="card card-glow h-100">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon yellow">
                                    <i class="bi bi-star-fill"></i>
                                </span>
                                自选股
                            </h6>
                            <div class="card-actions">
                                <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addStockModal">
                                    <i class="bi bi-plus-lg"></i> 添加
                                </button>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 align-middle">
                                    <thead>
                                        <tr>
                                            <th>名称</th>
                                            <th class="text-end">最新价</th>
                                            <th class="text-end">涨跌幅</th>
                                            <th class="text-center">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="watchlistBody">
                                        <tr>
                                            <td colspan="4" class="text-center text-muted py-4">
                                                <div class="spinner-border spinner-border-sm me-1"></div>加载中...
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 3: Market Rankings (Tabs) + Sector Overview -->
            <div class="row g-4 mb-4">
                <!-- 排行榜: Tab 切换(涨幅/跌幅/成交额/换手率) -->
                <div class="col-lg-8 animate-in delay-4">
                    <div class="card card-glow h-100">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon">
                                    <i class="bi bi-bar-chart-fill"></i>
                                </span>
                                市场排行
                            </h6>
                            <ul class="nav nav-pills nav-sm" id="rankingTabs">
                                <li class="nav-item">
                                    <a class="nav-link active" href="javascript:;" data-tab="gainers">涨幅榜</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="javascript:;" data-tab="losers">跌幅榜</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="javascript:;" data-tab="amount">成交额榜</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="javascript:;" data-tab="turnover">换手率榜</a>
                                </li>
                            </ul>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 align-middle">
                                    <thead id="rankingHead">
                                        <tr>
                                            <th class="text-center" style="width: 50px;">排名</th>
                                            <th>名称</th>
                                            <th class="text-end">最新价</th>
                                            <th class="text-end">涨跌幅</th>
                                        </tr>
                                    </thead>
                                    <tbody id="rankingBody">
                                        <tr>
                                            <td colspan="4" class="text-center text-muted py-4">
                                                <div class="spinner-border spinner-border-sm me-1"></div>加载中...
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 板块概览: 涨幅前5 / 跌幅前5 -->
                <div class="col-lg-4 animate-in delay-5">
                    <div class="card card-glow h-100">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon purple">
                                    <i class="bi bi-layers-fill"></i>
                                </span>
                                今日板块概览
                            </h6>
                            <div class="card-actions">
                                <a href="/page/sector" class="btn btn-secondary btn-sm">
                                    查看全部 <i class="bi bi-box-arrow-up-right ms-1"></i>
                                </a>
                            </div>
                        </div>
                        <div class="card-body" id="sectorOverviewContainer">
                            <div class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm me-1"></div>加载中...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 4: Charts -->
            <div class="row g-4">
                <div class="col-lg-6 animate-in delay-5">
                    <div class="card card-glow">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon">
                                    <i class="bi bi-graph-up"></i>
                                </span>
                                自选股涨跌幅对比
                            </h6>
                        </div>
                        <div class="card-body">
                            <div id="trendChart" class="chart-container-sm"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 animate-in delay-6">
                    <div class="card card-glow">
                        <div class="card-header">
                            <h6 class="card-title">
                                <span class="card-title-icon purple">
                                    <i class="bi bi-pie-chart-fill"></i>
                                </span>
                                自选股行业分布
                            </h6>
                        </div>
                        <div class="card-body">
                            <div id="pieChart" class="chart-container-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add Stock Modal -->
<div class="modal fade" id="addStockModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>添加自选股</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addStockForm">
                    <div class="mb-3">
                        <label class="form-label">股票代码</label>
                        <input type="text" class="form-control" id="stockCodeInput"
                               placeholder="请输入股票代码，如 600519" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitAddStock()">
                    <i class="bi bi-check-lg me-1"></i>确认添加
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<div th:replace="~{fragments/common :: scripts}"></div>
<script th:src="@{/js/charts-theme.js}"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
