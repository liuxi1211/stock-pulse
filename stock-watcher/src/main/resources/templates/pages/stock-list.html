<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${pageTitle})}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/common :: sidebar}"></nav>

    <div th:replace="~{fragments/common :: sidebarOverlay}"></div>

    <div class="main-content">
        <header th:replace="~{fragments/common :: topNavbar}"></header>

        <main class="content-area">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1 class="page-title">行情中心</h1>
                    <p class="text-muted mb-0" style="font-size: 13px; margin-top: 4px;">实时行情榜单，支持按涨幅/换手率/成交额等维度排序筛选</p>
                </div>
                <div class="page-actions">
                    <!-- 行情中心内搜索框（SearchSuggest，跳转个股详情） -->
                    <div class="input-group input-group-sm" style="width: 260px;">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="stockListSearchInput"
                               placeholder="输入股票代码/名称/拼音首字母"
                               autocomplete="off">
                    </div>
                    <button class="btn btn-secondary btn-sm" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                    <button class="btn btn-primary btn-sm" id="exportBtn">
                        <i class="bi bi-download"></i> 导出
                    </button>
                </div>
            </div>

            <!-- Main card: rank tabs + filters + table -->
            <div class="animate-in delay-1">
                <div class="card card-glow">
                    <!-- Card header: title + 6 rank tabs -->
                    <div class="card-header">
                        <h6 class="card-title">
                            <span class="card-title-icon">
                                <i class="bi bi-bar-chart-fill"></i>
                            </span>
                            <span id="rankTitle">行情榜单</span>
                        </h6>
                        <div class="card-actions">
                            <small class="text-muted" id="pageInfo">共 0 条</small>
                        </div>
                        <ul class="nav nav-pills nav-sm" id="rankTabs">
                            <!-- tabs rendered by stock-list.js -->
                        </ul>
                    </div>

                    <!-- Filter bar: industry + market + data date -->
                    <div class="card-body pb-2">
                        <form class="row g-2 align-items-end" onsubmit="return false;">
                            <div class="col-md-3 col-6">
                                <label class="form-label small mb-1">行业</label>
                                <select class="form-select form-select-sm" id="industrySelect">
                                    <option value="">全部行业</option>
                                </select>
                            </div>
                            <div class="col-md-3 col-6">
                                <label class="form-label small mb-1">市场</label>
                                <select class="form-select form-select-sm" id="marketSelect">
                                    <option value="">全部市场</option>
                                </select>
                            </div>
                            <div class="col-md-6 text-md-end text-muted small" id="dataDate">
                                数据日期 -
                            </div>
                        </form>
                    </div>

                    <!-- Table -->
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped table-sm mb-0 align-middle">
                                <thead id="stockListHead">
                                    <!-- headers rendered by stock-list.js -->
                                </thead>
                                <tbody id="stockListBody">
                                    <tr>
                                        <td colspan="14" class="text-center text-muted py-4">
                                            <div class="spinner-border spinner-border-sm me-1"></div>加载中...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div class="card-footer">
                        <small class="text-muted" id="pageInfoFooter">共 0 条</small>
                        <nav>
                            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/common :: toastContainer}"></div>

<div th:replace="~{fragments/common :: scripts}"></div>
<script th:src="@{/js/stock-list.js}"></script>
</body>
</html>
