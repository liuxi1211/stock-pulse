<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${pageTitle})}"></head>
<link rel="stylesheet" th:href="@{/css/backtest.css}">
<body>
<div class="app-container">
    <nav th:replace="~{fragments/common :: sidebar}"></nav>
    <div th:replace="~{fragments/common :: sidebarOverlay}"></div>

    <div class="main-content">
        <header th:replace="~{fragments/common :: topNavbar}"></header>

        <main class="content-area backtest-page" id="backtestListPage">
            <!-- 页头 -->
            <div class="bt-page-header">
                <div>
                    <h1 class="bt-page-title">
                        <span th:text="${pageTitle}">回测中心</span>
                        <span class="count" id="headerCount">— 次回测</span>
                    </h1>
                    <p class="bt-page-subtitle">策略分组视图 · 折叠/展开切换 · 历史回测分页 · 对比篮</p>
                </div>
                <div class="bt-page-actions">
                    <a th:href="@{/quant/backtests/compare}" class="btn-bt btn-bt-secondary btn-bt-sm" title="对比篮">
                        <i class="bi bi-bar-chart-line-fill"></i> 对比篮
                        <span id="compareCountBadge" style="margin-left:4px;padding:1px 6px;background:var(--accent-blue);color:#fff;border-radius:8px;font-family:var(--font-mono);font-size:10px;display:none;">0</span>
                    </a>
                    <a th:href="@{/quant/backtests/new}" class="btn-bt btn-bt-primary btn-bt-sm">
                        <i class="bi bi-plus-lg"></i> 新建回测
                    </a>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="bt-filter-bar">
                <div class="bt-search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="filterKeyword" placeholder="搜索策略名 / 任务 ID..." autocomplete="off">
                </div>
                <select class="bt-filter-select" id="filterStatus">
                    <option value="">全部状态</option>
                    <option value="PENDING">⏳ PENDING</option>
                    <option value="RUNNING">🔄 RUNNING</option>
                    <option value="SUCCESS">✅ SUCCESS</option>
                    <option value="FAILED">⚠️ FAILED</option>
                    <option value="CANCELLED">✕ CANCELLED</option>
                </select>
                <div class="bt-filter-spacer"></div>
                <span id="filterSummary" style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">— 个策略 · — 次回测</span>
            </div>

            <!-- 策略分组网格 -->
            <div class="bt-strat-grid" id="stratGrid">
                <div class="bt-empty-state">
                    <i class="bi bi-hourglass-split"></i>
                    <div class="bt-empty-state-title">加载中…</div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 对比篮（浮动，固定在 body 下） -->
<div class="bt-compare-tray" id="compareTray" style="display:none;">
    <div class="bt-compare-tray-title">
        <i class="bi bi-bar-chart-line-fill"></i>对比篮
    </div>
    <div class="bt-compare-chips" id="compareChips"></div>
    <a href="#" class="btn-seal" id="btnStartCompare" style="height:34px;font-size:12px;padding:0 16px;">开始对比 →</a>
    <button type="button" class="btn-bt btn-bt-ghost btn-bt-sm" id="btnClearCompare" style="color:var(--text-muted);">清空</button>
</div>

<div th:replace="~{fragments/common :: toastContainer}"></div>
<div th:replace="~{fragments/common :: scripts}"></div>
<script th:src="@{/js/backtest-list.js}"></script>
</body>
</html>
