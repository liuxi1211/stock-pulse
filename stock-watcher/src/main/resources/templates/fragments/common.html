<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<!-- ============================================================
     Head Fragment
     ============================================================ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'StockPulse'">StockPulse</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('sp-theme');
                if (t !== 'azure' && t !== 'mist' && t !== 'cyber') t = 'azure';
                document.documentElement.setAttribute('data-theme', t);
                document.documentElement.style.colorScheme = (t === 'cyber') ? 'dark' : 'light';
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'azure');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <link th:href="@{/css/components.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body>

<!-- ============================================================
     Sidebar Fragment
     ============================================================ -->
<nav th:fragment="sidebar" class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">
            <i class="bi bi-graph-up-arrow"></i>
        </div>
        <div>
            <div class="logo-text">StockPulse</div>
            <div class="logo-subtitle">智能股票监控</div>
        </div>
    </div>

    <div class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">主要功能</div>
            <a th:href="@{/}" class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                <i class="bi bi-speedometer2"></i>
                <span>仪表盘</span>
            </a>
            <a th:href="@{/page/stock-list}" class="nav-item" th:classappend="${activeMenu == 'stock-list'} ? 'active'">
                <i class="bi bi-bar-chart-line"></i>
                <span>行情中心</span>
            </a>
            <a th:href="@{/page/watchlist}" class="nav-item" th:classappend="${activeMenu == 'watchlist'} ? 'active'">
                <i class="bi bi-star"></i>
                <span>自选股</span>
            </a>
            <a href="#" class="nav-item">
                <i class="bi bi-activity"></i>
                <span>K线分析</span>
            </a>
            <a href="#" class="nav-item">
                <i class="bi bi-arrow-repeat"></i>
                <span>策略回测</span>
            </a>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">量化研究</div>
            <a th:href="@{/page/factor-library}" class="nav-item" th:classappend="${activeMenu == 'factor-library'} ? 'active'">
                <i class="bi bi-calculator"></i>
                <span>因子库</span>
            </a>
            <a th:href="@{/page/screener}" class="nav-item" th:classappend="${activeMenu == 'screener'} ? 'active'">
                <i class="bi bi-funnel"></i>
                <span>选股中心</span>
            </a>
            <a th:href="@{/quant/strategies}" class="nav-item" th:classappend="${activeMenu == 'strategy-list'} ? 'active'">
                <i class="bi bi-rulers"></i>
                <span>策略管理</span>
                <span class="badge" id="strategyCountBadge" style="margin-left:auto;">—</span>
            </a>
            <a th:href="@{/quant/backtests}" class="nav-item" th:classappend="${activeMenu == 'backtest-list'} ? 'active'">
                <i class="bi bi-graph-up-arrow"></i>
                <span>回测中心</span>
            </a>
        </div>

        <div class="nav-section" th:if="${session.AUTH_USER?.role?.name() == 'ADMIN'}">
            <div class="nav-section-title">管理中心</div>
            <a th:href="@{/page/user-management}" class="nav-item" th:classappend="${activeMenu == 'user-management'} ? 'active'">
                <i class="bi bi-people"></i>
                <span>用户管理</span>
            </a>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">系统</div>
            <a th:href="@{/page/settings}" class="nav-item" th:classappend="${activeMenu == 'settings'} ? 'active'">
                <i class="bi bi-gear"></i>
                <span>系统设置</span>
            </a>
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="user-card" data-bs-toggle="dropdown" style="cursor: pointer;">
            <div class="user-avatar" th:text="${session.AUTH_USER?.username?.substring(0,1)?.toUpperCase()} ?: 'A'">A</div>
            <div class="user-info">
                <div class="user-name" th:text="${session.AUTH_USER?.username} ?: 'admin'">admin</div>
                <div class="user-role" th:text="${session.AUTH_USER?.role} ?: '管理员'">管理员</div>
            </div>
            <i class="bi bi-chevron-down text-muted" style="font-size: 12px;"></i>
        </div>
        <ul class="dropdown-menu" style="width: 228px; margin: 8px 0 0;">
            <li><a class="dropdown-item" th:href="@{/page/settings}"><i class="bi bi-gear me-2"></i>系统设置</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
        </ul>
    </div>
</nav>

<!-- ============================================================
     Sidebar Overlay Fragment (Mobile)
     ============================================================ -->
<div th:fragment="sidebarOverlay" class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ============================================================
     Top Navbar Fragment
     ============================================================ -->
<header th:fragment="topNavbar" class="top-navbar">
    <div class="top-bar-left">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <div class="market-status" id="marketStatus">
            <span class="status-dot"></span>
            <span>交易中</span>
        </div>
    </div>

    <div class="search-box" id="globalSearchForm">
        <i class="bi bi-search search-icon"></i>
        <input type="text" placeholder="搜索股票代码或名称..." id="globalSearchInput">
    </div>

    <div class="top-bar-right">
        <button class="top-bar-btn" id="themeToggle" type="button" title="切换主题" aria-label="切换主题">
            <i class="bi bi-sun"></i>
        </button>
        <button class="top-bar-btn" title="通知">
            <i class="bi bi-bell"></i>
            <span class="notification-dot"></span>
        </button>
        <div class="d-none d-lg-flex align-items-center gap-3 user-dropdown-btn" data-bs-toggle="dropdown">
            <div class="user-avatar" style="width:32px;height:32px;font-size:13px;" th:text="${session.AUTH_USER?.username?.substring(0,1)?.toUpperCase()} ?: 'A'">A</div>
            <span style="font-size:13px;font-weight:500;" th:text="${session.AUTH_USER?.username} ?: 'admin'">admin</span>
            <i class="bi bi-chevron-down" style="font-size:12px;color:var(--text-muted);"></i>
        </div>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/page/settings}"><i class="bi bi-gear me-2"></i>系统设置</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
        </ul>
    </div>
</header>

<!-- ============================================================
     Scripts Fragment
     ============================================================ -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <script th:src="@{/js/search-suggest.js?v=20260715}"></script>
    <script th:src="@{/js/theme.js?v=20260715b}"></script>
    <script th:src="@{/js/common.js?v=20260715}"></script>
</th:block>

<!-- ============================================================
     Toast Container Fragment
     ============================================================ -->
<div th:fragment="toastContainer" id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

</body>
</html>
