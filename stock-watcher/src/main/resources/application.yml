server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: stock-watcher
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  config:
    import: classpath:application-secret.properties
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: always
      schema-locations: ${SCHEMA_LOCATION:classpath:schema-mysql.sql}
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.arthur.stock.model
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted

# ========== Python Compute Service ==========
python:
  compute:
    url: http://127.0.0.1:8085

# ========== Tushare API Configuration ==========
# 真实 token 请填写在 application-secret.properties 中，避免提交到版本控制
tushare:
  token: ${tushare.token}
  base-url: http://api.tushare.pro
  timeout: 30000
  rate-limit:
    daily:
      permits-per-minute: 500
    stock_basic:
      permits-per-minute: 500
    trade_cal:
      permits-per-minute: 500
    adj_factor:
      permits-per-minute: 500
    dividend:
      permits-per-minute: 180

# ========== Auth Configuration ==========
auth:
  admin-skip-totp: true

# ========== App Database Type (mysql / sqlite) ==========
app:
  db-type: ${DB_TYPE:mysql}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always